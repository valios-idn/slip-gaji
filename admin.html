<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="style-admin.css">
<script defer src="admin.js"></script>

<style>
.login-box {
  max-width: 400px;
  margin: 80px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<div id="loginPage" class="login-box">
  <h2>🔐 Login Admin</h2>

  <input type="text" id="username" placeholder="Username"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button class="btn-primary" onclick="login()">Login</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" class="container hidden">

<h2>🧑‍💼 Generator JSON Pegawai</h2>

<div class="top-actions">
  <button class="btn-primary" onclick="tambahBaris()">➕ Tambah</button>
  <button class="btn-success" onclick="generateJSON()">🚀 Generate</button>
  <button class="btn-copy" onclick="copyJSON()">📋 Copy</button>
  <button class="btn-danger" onclick="logout()">🚪 Logout</button>
</div>

<div class="table-wrapper">
<table id="table">
  <thead>
    <tr>
      <th>NIP</th>
      <th>Nama File</th>
      <th>Password</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td><input type="text"></td>
      <td><input type="text"></td>
      <td><input type="text"></td>
      <td><button class="btn-danger" onclick="hapusBaris(this)">❌</button></td>
    </tr>
  </tbody>
</table>
</div>

<div class="output" id="output"></div>

</div>

</body>
</html>
