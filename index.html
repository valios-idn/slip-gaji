<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Gaji Pegawai</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div class="card">

  <!-- LOGO -->
  <img src="images/logo.png" alt="Logo" class="logo"

  <h1>Slip Gaji Pegawai</h1>

  <form id="pdfForm">
    <select id="tahun" required>
      <option value="">Pilih Tahun</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>

    <select id="bulan" required>
      <option value="">Pilih Bulan</option>
      <option value="01">Januari</option>
      <option value="02">Februari</option>
    </select>

    <input type="text" id="nama" placeholder="NIP / NIPPPK (tanpa .pdf)" required>

    <button type="submit">Tampilkan PDF</button>
  </form>

  <div id="pesan"></div>
  <div id="error" class="error"></div>

  <div id="viewerContainer">
    <canvas id="pdfCanvas"></canvas>
    <button id="downloadBtn" class="download-btn">Download PDF</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
