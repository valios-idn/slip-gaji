<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Gaji Pegawai</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div class="card">

  <!-- LOGO -->
  <img src="images/logo.png" alt="Logo" class="logo"
        onerror="this.src='https://via.placeholder.com/110'">

  <h1>Slip Gaji Pegawai</h1>

  <form id="pdfForm">
  <label>Tahun</label>
  <select id="tahun" required>
    <option value="">Pilih Tahun</option>
    <option value="2026">2026</option>
    <option value="2027">2027</option>
  </select>

  <label>Bulan</label>
  <select id="bulan" required>
    <option value="">Pilih Bulan</option>
    <option value="01">Januari</option>
    <option value="02">Februari</option>
    <option value="03">Maret</option>
    <option value="04">April</option>
    <option value="05">Mei</option>
    <option value="06">Juni</option>
    <option value="07">Juli</option>
    <option value="08">Agustus</option>
    <option value="09">September</option>
    <option value="10">Oktober</option>
    <option value="11">November</option>
    <option value="12">Desember</option>
  </select>

  <label>NIP / NI PPPK</label>
  <input type="text" id="nip" placeholder="NIP / NI PPPK"
       pattern="[0-9]+" inputmode="numeric" required>

  <button type="submit">Tampilkan Slip Gaji</button>
</form>

  <div id="pesan"></div>
  <div id="error" class="error"></div>

  <div id="viewerContainer" style="display:none;">
  <div id="pdfViewer"></div>
  <button id="downloadBtn" class="download-btn">Download PDF</button>
</div>

<p class="footer-text">Dibuat oleh Keuangan RRI Tahuna</p>

</div>

<script src="script.js"></script>

</body>
</html>
