<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirect Username</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">
  <div class="max-w-md w-full bg-slate-900 p-8 rounded-3xl shadow-2xl">
    <h1 class="text-4xl font-bold text-center mb-2">Masukkan Username</h1>
    <p class="text-slate-400 text-center mb-8">Kamu akan langsung diarahkan ke Google Drive</p>
    
    <form id="form" class="space-y-6">
      <input 
        type="text" 
        id="username" 
        placeholder="contoh: clash" 
        required
        class="w-full px-6 py-4 bg-slate-800 rounded-2xl text-xl focus:outline-none focus:ring-4 focus:ring-blue-500">
      
      <button 
        type="submit"
        class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl text-xl font-semibold transition">
        Cek & Redirect
      </button>
    </form>

    <div id="message" class="mt-6 text-center text-sm"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
