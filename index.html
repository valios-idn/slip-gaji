<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Slip Gaji Karyawan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 35px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      color: #1e293b;
      text-align: center;
    }
    h1 {
      font-size: 2.1rem;
      margin-bottom: 12px;
      color: var(--primary-dark);
    }
    .subtitle {
      color: #64748b;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #334155;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.25s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }
    button {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
    }
    button:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(99,102,241,0.3);
    }
    .icon {
      font-size: 3.5rem;
      color: var(--primary);
      margin-bottom: 20px;
    }
    @media (max-width: 500px) {
      .card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

<div class="card">
  <i class="fas fa-file-invoice-dollar icon"></i>
  <h1>Portal Slip Gaji</h1>
  <p class="subtitle">Masukkan data untuk melihat slip gaji Anda</p>

  <form id="formCari">
    <div class="form-group">
      <label for="nip">Nomor Pegawai / NIP</label>
      <input type="text" id="nip" placeholder="Contoh: 10234 atau 19920312" required/>
    </div>

    <div class="form-group">
      <label for="tahun">Tahun</label>
      <select id="tahun" required>
        <option value="">Pilih Tahun</option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
      </select>
    </div>

    <div class="form-group">
      <label for="bulan">Bulan</label>
      <select id="bulan" required>
        <option value="">Pilih Bulan</option>
        <option value="01">Januari</option>
        <option value="02">Februari</option>
        <option value="03">Maret</option>
        <option value="04">April</option>
        <option value="05">Mei</option>
        <option value="06">Juni</option>
        <option value="07">Juli</option>
        <option value="08">Agustus</option>
        <option value="09">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
    </div>

    <button type="submit">
      <i class="fas fa-eye"></i> Tampilkan Slip Gaji
    </button>
  </form>
</div>

<script>
  document.getElementById('formCari').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const nip   = document.getElementById('nip').value.trim();
    const tahun = document.getElementById('tahun').value;
    const bulan = document.getElementById('bulan').value;

    if (!nip || !tahun || !bulan) {
      alert('Harap isi semua field!');
      return;
    }

    // Format nama file → sesuaikan dengan yang ada di server/folder slips
    const fileName = `${nip}.pdf`;
    const pdfPath = `files/${tahun}/${bulan}/${fileName}`;   // ubah path sesuai struktur folder

    // Buka di tab baru dengan viewer PDF.js
    const viewerUrl = `pdfjs/web/viewer.html?file=${encodeURIComponent(pdfPath)}`;
    window.open(viewerUrl, '_blank');
  });
</script>

</body>
</html>
