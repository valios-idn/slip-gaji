<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer PDF + Download</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(to bottom, #e0f2fe, #bae6fd);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
      text-align: center;
    }

    h1 {
      color: #1e40af;
    }

    label {
      display: block;
      margin-top: 1rem;
      text-align: left;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.4rem;
      border-radius: 8px;
      border: 1px solid #94a3b8;
    }

    button {
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.9rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .message {
      margin-top: 1rem;
      color: #475569;
    }

    .error {
      color: red;
      margin-top: 1rem;
    }

    #viewerContainer {
      margin-top: 20px;
      display: none;
    }

    canvas {
      width: 100%;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .controls button {
      flex: 1;
    }

    .download-btn {
      background: #16a34a;
    }

    .download-btn:hover {
      background: #15803d;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Viewer PDF</h1>

  <form id="pdfForm">
    <label>Tahun</label>
    <select id="tahun" required>
      <option value="">Pilih tahun...</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
      <option value="2028">2028</option>
    </select>

    <label>Bulan</label>
    <select id="bulan" required>
      <option value="">Pilih bulan...</option>
      <option value="01_Januari">Januari</option>
      <option value="02_Februari">Februari</option>
      <option value="03_Maret">Maret</option>
      <option value="04_April">April</option>
      <option value="05_Mei">Mei</option>
      <option value="06_Juni">Juni</option>
      <option value="07_Juli">Juli</option>
      <option value="08_Agustus">Agustus</option>
      <option value="09_September">September</option>
      <option value="10_Oktober">Oktober</option>
      <option value="11_November">November</option>
      <option value="12_Desember">Desember</option>
    </select>

    <label>Nama file (tanpa .pdf)</label>
    <input type="text" id="nama" required />

    <button type="submit">Tampilkan PDF</button>
  </form>

  <div id="pesan" class="message"></div>
  <div id="error" class="error"></div>

  <div id="viewerContainer">
    <canvas id="pdfCanvas"></canvas>

    <div class="controls">
      <button id="prev">⬅ Prev</button>
      <button id="next">Next ➡</button>
    </div>

    <button id="downloadBtn" class="download-btn">⬇ Download PDF</button>

    <div class="message" id="pageInfo"></div>
  </div>
</div>

<script>
const form = document.getElementById('pdfForm');
const pesan = document.getElementById('pesan');
const errorDiv = document.getElementById('error');
const canvas = document.getElementById('pdfCanvas');
const ctx = canvas.getContext('2d');
const viewer = document.getElementById('viewerContainer');

const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const downloadBtn = document.getElementById('downloadBtn');
const pageInfo = document.getElementById('pageInfo');

let pdfDoc = null;
let currentPage = 1;
let currentUrl = '';

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });

  canvas.height = viewport.height;
  canvas.width = viewport.width;

  await page.render({
    canvasContext: ctx,
    viewport: viewport
  }).promise;

  pageInfo.textContent = `Halaman ${num} dari ${pdfDoc.numPages}`;
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  const tahun = document.getElementById('tahun').value;
  const bulan = document.getElementById('bulan').value;
  const nama = document.getElementById('nama').value
    .trim()
    .replace(/[^a-zA-Z0-9_-]/g, '');

  errorDiv.textContent = '';
  pesan.textContent = '';
  viewer.style.display = 'none';

  if (!tahun || !bulan || !nama) {
    errorDiv.textContent = 'Harap isi semua kolom!';
    return;
  }

  const baseUrl = 'https://raw.githubusercontent.com/madhagaskar182/testing/main/files/';
  const url = `${baseUrl}${tahun}/${bulan}/${nama}.pdf`;

  pesan.textContent = 'Memuat PDF...';

  try {
    const check = await fetch(url, { method: 'HEAD' });
    if (!check.ok) throw new Error('File tidak ditemukan');

    currentUrl = url;

    pdfDoc = await pdfjsLib.getDocument(url).promise;
    currentPage = 1;

    await renderPage(currentPage);

    viewer.style.display = 'block';
    pesan.textContent = '';

  } catch (err) {
    errorDiv.textContent = err.message;
  }
});

prevBtn.onclick = () => {
  if (currentPage <= 1) return;
  currentPage--;
  renderPage(currentPage);
};

nextBtn.onclick = () => {
  if (currentPage >= pdfDoc.numPages) return;
  currentPage++;
  renderPage(currentPage);
};

// DOWNLOAD
downloadBtn.onclick = () => {
  if (!currentUrl) return;

  const link = document.createElement('a');
  link.href = currentUrl;
  link.download = '';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};
</script>

</body>
</html>
