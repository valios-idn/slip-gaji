<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin JSON Generator PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', monospace;
  background: #020617;
  color: #e2e8f0;
  margin: 0;
}

/* LOGIN */
.login-box {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  background: #0f172a;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

/* INPUT & BUTTON */
input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.adminPass {
  width: 100%;

button {
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* APP */
.container {
  display: none;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  max-width: 700px;
  margin: auto;
}

/* GRID */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.full {
  grid-column: span 2;
}

/* DROP */
.drop-area {
  border: 2px dashed #334155;
  padding: 30px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.drop-area:hover {
  border-color: #3b82f6;
  background: rgba(59,130,246,0.1);
}

/* OUTPUT */
textarea {
  width: 100%;
  height: 250px;
  margin-top: 10px;
  background: #000;
  color: #22c55e;
  padding: 10px;
  border-radius: 10px;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 13px;
}

/* TOKEN STYLE */
#token {
  letter-spacing: 2px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .form-grid {
    grid-template-columns: 1fr;
  }

  .full {
    grid-column: span 1;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="container" id="app">
  <div class="card">
    <h2>⚡ JSON Generator PRO</h2>

    <div class="form-grid">

      <!-- DROP -->
      <div class="drop-area full" id="dropArea">
        <p>📂 Drag & Drop Excel atau klik</p>
        <input type="file" id="fileInput" hidden>
      </div>

      <!-- BUTTON -->
      <button onclick="generate()">Generate JSON</button>
      <button onclick="downloadJSON()">Download JSON</button>

      <!-- TOKEN -->
      <div class="full">
        <input type="text" id="token" placeholder="GitHub Token">
      </div>

      <!-- BUTTON FULL -->
      <button class="full" onclick="uploadGitHub()">Upload ke GitHub</button>

      <!-- STATUS -->
      <div class="status full" id="status"></div>

      <!-- OUTPUT -->
      <textarea class="full" id="output" placeholder="Hasil JSON akan muncul di sini..."></textarea>

    </div>
  </div>
</div>

<script>
// ================= LOGIN =================
const ADMIN_HASH = "eb8dd3569264665279b7715826fcf2a291b074137704e18d06574f321fd91a58";

async function hash(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function login(){
  const pass = document.getElementById("adminPass").value;
  const h = await hash(pass);

  if(h === ADMIN_HASH){
    loginPage.style.display="none";
    app.style.display="block";
  } else {
    alert("Password salah!");
  }
}

// ================= AUTO TOKEN =================
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("token").value = "_pat_11CAL3MIA0ajH8eltzw2Ob_VWJz5mpneuWtltJ6dJBi5O7Yz7tGZck1GQMhnV66pkLHVNDARITUfyysRDi";
});

// ================= DRAG DROP =================
let fileGlobal = null;

dropArea.onclick = () => fileInput.click();

fileInput.onchange = e => {
  fileGlobal = e.target.files[0];
  dropArea.innerHTML = "📄 " + fileGlobal.name;
};

dropArea.ondragover = e => e.preventDefault();

dropArea.ondrop = e => {
  e.preventDefault();
  fileGlobal = e.dataTransfer.files[0];
  dropArea.innerHTML = "📄 " + fileGlobal.name;
};

// ================= HASH PASSWORD =================
async function hashPass(p){
  const enc = new TextEncoder().encode(p);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let dataResult = {};

// ================= GENERATE =================
async function generate(){
  if(!fileGlobal){
    alert("Upload file dulu!");
    return;
  }

  const reader = new FileReader();

  reader.onload = async e => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    let result = {};

    for(let r of json){
      const email = (r.email||"").toLowerCase().trim();
      const nama = (r.namaFile||"").toUpperCase().trim();
      const pass = (r.password||"").toString().trim();

      if(!email || !nama || !pass) continue;

      result[email] = {
        namaFile: nama,
        password: await hashPass(pass)
      };
    }

    dataResult = result;
    output.value = JSON.stringify(result, null, 2);
  };

  reader.readAsArrayBuffer(fileGlobal);
}

// ================= DOWNLOAD =================
function downloadJSON(){
  if(Object.keys(dataResult).length === 0){
    alert("Belum ada data!");
    return;
  }

  const blob = new Blob([JSON.stringify(dataResult,null,2)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dataPegawai.json";
  a.click();
}

// ================= UPLOAD GITHUB =================
async function uploadGitHub(){

  if(Object.keys(dataResult).length === 0){
    alert("Generate data dulu!");
    return;
  }

  const token = document.getElementById("token").value;

  if(!token){
    alert("Token kosong!");
    return;
  }

  status.textContent = "⏳ Uploading...";

  const repo = "valios-idn/slip-gaji";
  const path = "dataPegawai.json";

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataResult,null,2))));
  const url = `https://api.github.com/repos/${repo}/contents/${path}`;

  try{
    let sha = null;

    const get = await fetch(url,{
      headers:{ Authorization:`token ${token}` }
    });

    if(get.ok){
      const d = await get.json();
      sha = d.sha;
    }

    const res = await fetch(url,{
      method:"PUT",
      headers:{
        Authorization:`token ${token}`,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        message:"update dataPegawai otomatis",
        content:content,
        sha:sha
      })
    });

    if(!res.ok) throw new Error();

    status.textContent = "✅ Upload berhasil!";
  }catch(err){
    console.error(err);
    status.textContent = "❌ Upload gagal!";
  }
}
</script>

</body>
</html>
