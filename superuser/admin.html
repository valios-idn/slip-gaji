<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin JSON Generator PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', monospace;
  background: #020617;
  color: #e2e8f0;
  margin: 0;
}

/* LOGIN */
.login-box {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-card {
  background: #0f172a;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* APP */
.container {
  display: none;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
}

/* DROP */
.drop-area {
  border: 2px dashed #334155;
  padding: 30px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
}

textarea {
  width: 100%;
  height: 250px;
  margin-top: 10px;
  background: #000;
  color: #22c55e;
  padding: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="container" id="app">
  <div class="card">
    <h2>⚡ JSON Generator PRO</h2>

    <div class="drop-area" id="dropArea">
      <p>Drag & Drop Excel atau klik</p>
      <input type="file" id="fileInput" hidden>
    </div>

    <button onclick="generate()">Generate JSON</button>
    <button onclick="downloadJSON()">Download JSON</button>

    <input type="password" id="token" placeholder="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">
    <button onclick="uploadGitHub()">Upload ke GitHub</button>

    <textarea id="output"></textarea>
  </div>
</div>

<script>
// LOGIN (simple hash)
async function hash(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// GANTI HASH PASSWORD ADMIN DI SINI
const ADMIN_HASH = "eb8dd3569264665279b7715826fcf2a291b074137704e18d06574f321fd91a58"; // contoh

async function login(){
  const pass = document.getElementById("adminPass").value;
  const h = await hash(pass);

  if(h.startsWith(ADMIN_HASH)){ // simple check
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("Password salah!");
  }
}

// DRAG DROP
let fileGlobal = null;
const drop = document.getElementById("dropArea");
const input = document.getElementById("fileInput");

drop.onclick = ()=>input.click();

input.onchange = e=>{
  fileGlobal = e.target.files[0];
  drop.innerText = fileGlobal.name;
};

drop.ondragover = e=>{
  e.preventDefault();
};

drop.ondrop = e=>{
  e.preventDefault();
  fileGlobal = e.dataTransfer.files[0];
  drop.innerText = fileGlobal.name;
};

// HASH PASSWORD USER
async function hashPass(p){
  const enc = new TextEncoder().encode(p);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let dataResult = {};

// GENERATE
async function generate(){
  if(!fileGlobal){ alert("Upload file!"); return; }

  const reader = new FileReader();

  reader.onload = async e=>{
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    let result = {};

    for(let r of json){
      const email = (r.email||"").toLowerCase();
      const nama = (r.namaFile||"").toUpperCase();
      const pass = (r.password||"").toString();

      if(!email||!nama||!pass) continue;

      result[email]={
        namaFile:nama,
        password: await hashPass(pass)
      };
    }

    dataResult = result;
    document.getElementById("output").value = JSON.stringify(result,null,2);
  };

  reader.readAsArrayBuffer(fileGlobal);
}

// DOWNLOAD
function downloadJSON(){
  const blob = new Blob([JSON.stringify(dataResult,null,2)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dataPegawai.json";
  a.click();
}

// UPLOAD GITHUB
async function uploadGitHub(){
  const token = document.getElementById("token").value;
  if(!token) return alert("Token kosong!");

  const repo = "valios-idn/slip-gaji"; // ganti
  const path = "dataPegawai.json";

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataResult,null,2))));

  const url = `https://api.github.com/repos/${repo}/contents/${path}`;

  let sha=null;

  const get = await fetch(url,{headers:{Authorization:`token ${token}`}});
  if(get.ok){
    const d=await get.json();
    sha=d.sha;
  }

  await fetch(url,{
    method:"PUT",
    headers:{
      Authorization:`token ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update data",
      content:content,
      sha:sha
    })
  });

  alert("Upload berhasil!");
}
</script>

</body>
</html>
