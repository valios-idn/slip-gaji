<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI', monospace;
  background:#020617;
  color:#e2e8f0;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.login-box{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

/* LAYOUT */
.wrapper{ display:flex; }

.sidebar{
  width:220px;
  background:#0f172a;
  height:100vh;
  padding:20px;
}

.menu{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.menu:hover{ background:#1e293b; }

.content{
  flex:1;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  max-width:900px;
}

/* FORM */
input,select,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* DROP AREA */
.drop-area{
  border:2px dashed #334155;
  padding:30px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}

.drop-area:hover{
  border-color:#3b82f6;
  background:rgba(59,130,246,0.1);
}

.drop-area.drag{
  border-color:#22c55e;
  background:rgba(34,197,94,0.1);
}

/* FILE */
.file-item{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
}

.file-top{
  display:flex;
  justify-content:space-between;
}

.remove{
  color:red;
  cursor:pointer;
}

/* PROGRESS */
.progress{
  height:6px;
  background:#1e293b;
  border-radius:10px;
  margin-top:5px;
}
.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}

/* OUTPUT */
textarea{
  width:100%;
  height:200px;
  background:#000;
  color:#22c55e;
  margin-top:10px;
  border-radius:10px;
  padding:10px;
}

.hidden{ display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="wrapper hidden" id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>⚡ ADMIN</h3>
  <div class="menu" onclick="showPage('dashboard')">Dashboard</div>
  <div class="menu" onclick="showPage('json')">JSON Generator</div>
  <div class="menu" onclick="showPage('upload')">Upload Slip</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage" class="card">
  <h2>👋 Selamat Datang</h2>
</div>

<!-- JSON -->
<div id="jsonPage" class="card hidden">
  <h2>JSON Generator</h2>

  <div class="drop-area" id="excelDrop">
    📊 Drag & Drop Excel / Klik
    <input type="file" id="excelFile" hidden>
  </div>

  <div id="jsonFileList"></div>

  <button onclick="generateJSON()">Generate JSON</button>

  <input type="text" id="tokenJson">

  <button onclick="uploadJSON()">Upload JSON</button>

  <textarea id="jsonOutput"></textarea>
</div>

<!-- UPLOAD -->
<div id="uploadPage" class="card hidden">
  <h2>Upload Slip Gaji</h2>

  <select id="tahun">
    <option>2026</option>
    <option>2027</option>
  </select>

  <select id="bulan">
    <option value="01">Januari</option>
    <option value="02">Februari</option>
  </select>

  <div class="drop-area" id="pdfDrop">
    📂 Drag & Drop PDF / Klik
    <input type="file" id="pdfFiles" multiple hidden>
  </div>

  <div id="fileList"></div>

  <input type="text" id="tokenUpload">

  <button onclick="uploadAll()">Upload Semua</button>

  <div id="status"></div>
</div>

</div>
</div>

<script>
// LOGIN
const ADMIN_HASH="eb8dd3569264665279b7715826fcf2a291b074137704e18d06574f321fd91a58";

async function hash(t){
  const e=new TextEncoder().encode(t);
  const b=await crypto.subtle.digest("SHA-256",e);
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function login(){
  if(await hash(adminPass.value)===ADMIN_HASH){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");
  } else alert("Salah!");
}

// NAV
let currentPage = "dashboard";

function showPage(p){

  if(currentPage === "json") resetJSON();
  if(currentPage === "upload") resetUpload();

  dashboardPage.classList.add("hidden");
  jsonPage.classList.add("hidden");
  uploadPage.classList.add("hidden");

  if(p==="dashboard") dashboardPage.classList.remove("hidden");
  if(p==="json") jsonPage.classList.remove("hidden");
  if(p==="upload") uploadPage.classList.remove("hidden");

  currentPage = p;
}

// RESET
function resetJSON(){
  excelFile.value = "";
  jsonOutput.value = "";
  jsonFileList.innerHTML = "";
  jsonData = {};
}

function resetUpload(){
  pdfFiles.value = "";
  fileList.innerHTML = "";
  files = [];
  status.innerText = "";
}
// TOKEN AUTO
const TOKEN="_pat_11CAL3MIA03YlOdbk6DTFt_K7vkaYfLDFxgt5w5chcvjunGjaWA79oRknfplcB62Df4IBWLSBJw41Bw1j1";
tokenJson.value=TOKEN;
tokenUpload.value=TOKEN;

// DRAG JSON
excelDrop.onclick=()=>excelFile.click();
excelDrop.ondrop=e=>{
  e.preventDefault();
  excelFile.files=e.dataTransfer.files;
  showExcel();
};
excelDrop.ondragover=e=>e.preventDefault();
excelFile.onchange=showExcel;

function showExcel(){
  const f=excelFile.files[0];
  if(!f) return;
  jsonFileList.innerHTML=`<div class="file-item">${f.name} <span class="remove" onclick="excelFile.value='';jsonFileList.innerHTML=''">✖</span></div>`;
}

// ================= HASH PASSWORD =================
async function hashPass(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);

  const hashBuffer = await crypto.subtle.digest("SHA-256", data);

  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}
  
// JSON GENERATE
// ================= JSON GENERATE =================
async function generateJSON(){

  const file = excelFile.files[0];

  if(!file){
    alert("⚠️ Pilih file Excel dulu!");
    return;
  }

  console.log("FILE:", file.name, file.type);

  const reader = new FileReader();

  reader.onload = async function(e){
    try{

      const data = new Uint8Array(e.target.result);

      // 🔥 READ EXCEL (MODE PALING AMAN)
      const workbook = XLSX.read(data, {
        type: "array",
        cellDates: true,
        cellText: false
      });

      console.log("SheetNames:", workbook.SheetNames);

      const sheetName = workbook.SheetNames[0];

      if(!sheetName){
        alert("❌ Sheet tidak ditemukan!");
        return;
      }

      const sheet = workbook.Sheets[sheetName];

      // 🔥 RAW DATA (LEBIH AMAN)
      const rows = XLSX.utils.sheet_to_json(sheet, {
        defval: "",
        raw: false
      });

      console.log("ROWS:", rows);

      if(!rows || rows.length === 0){
        alert("⚠️ File terbaca tapi kosong / header salah!");
        return;
      }

      let result = {};

      for(let row of rows){

        // 🔥 NORMALISASI HEADER (ANTI SPASI / CASE)
        const normalized = {};
        for(let key in row){
          const cleanKey = key.toLowerCase().replace(/\s/g,'');
          normalized[cleanKey] = row[key];
        }

        const email = (normalized.email || "").toLowerCase().trim();
        const nama  = (normalized.namafile || "").toUpperCase().trim();
        const pass  = (normalized.password || "").toString().trim();

        if(!email || !nama || !pass){
          console.warn("SKIP ROW:", row);
          continue;
        }

        result[email] = {
          namaFile: nama,
          password: await hashPass(pass)
        };
      }

      if(Object.keys(result).length === 0){
        alert("❌ Data tidak terbaca!\n\nCek:\n- Nama kolom\n- Isi tidak kosong");
        return;
      }

      jsonData = result;
      jsonOutput.value = JSON.stringify(result, null, 2);

      alert("✅ JSON berhasil dibuat!");

    }catch(err){
      console.error("ERROR DETAIL:", err);

      alert(
        "❌ Gagal membaca Excel!\n\n" +
        "Kemungkinan:\n" +
        "1. File bukan .xlsx\n" +
        "2. File rusak\n" +
        "3. Format aneh (merge cell)\n\n" +
        "Buka Console (F12) untuk detail"
      );
    }
  };

  reader.onerror = function(){
    alert("❌ FileReader gagal membaca file!");
  };

  reader.readAsArrayBuffer(file);
}
// UPLOAD JSON
async function uploadJSON(){

  if(Object.keys(jsonData).length === 0){
    alert("⚠️ Generate JSON dulu!");
    return;
  }

  const token = tokenJson.value;

  if(!token){
    alert("⚠️ Token kosong!");
    return;
  }

  const status = document.getElementById("status") || {};
  if(status) status.innerText = "⏳ Upload ke GitHub...";

  const repo = "valios-idn/slip-gaji";
  const path = "dataPegawai.json";

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(jsonData,null,2))));
  const url = `https://api.github.com/repos/${repo}/contents/${path}`;

  try{

    let sha = null;

    // ================= CEK FILE =================
    const get = await fetch(url,{
      headers:{
        Authorization:`Bearer ${token}`,
        Accept: "application/vnd.github+json"
      }
    });

    if(get.ok){
      const data = await get.json();
      sha = data.sha;
      console.log("File sudah ada, pakai SHA:", sha);
    }else{
      console.log("File belum ada, create baru");
    }

    // ================= UPLOAD =================
    const res = await fetch(url,{
      method:"PUT",
      headers:{
        Authorization:`Bearer ${token}`,
        "Content-Type":"application/json",
        Accept: "application/vnd.github+json"
      },
      body: JSON.stringify({
        message:"update dataPegawai otomatis",
        content:content,
        sha:sha
      })
    });

    const result = await res.json();
    console.log("RESULT:", result);

    if(!res.ok){
      throw new Error(result.message || "Upload gagal");
    }

    alert("✅ JSON berhasil diupload!");
    if(status) status.innerText = "✅ Upload sukses";

  }catch(err){
    console.error("ERROR:", err);
    alert("❌ Gagal upload:\n" + err.message);
    if(status) status.innerText = "❌ Upload gagal";
  }
}

/*  NOTIFIKASI */
async function uploadAll(){

  if(files.length === 0){
    alert("⚠️ Tidak ada file!");
    return;
  }

  const token = tokenUpload.value;

  if(!token){
    alert("⚠️ Token kosong!");
    return;
  }

  status.innerText = "⏳ Upload sedang berjalan...";

  let success = 0;

  for(let i=0;i<files.length;i++){
    try{
      await uploadSingle(files[i], i, token);
      success++;
    }catch(e){
      console.error(e);
    }
  }

  // ================= NOTIF FINAL =================
  if(success === files.length){
    status.innerText = "🎉 Semua file berhasil diupload!";
    alert("🎉 Upload selesai semua!");
  }else{
    status.innerText = `⚠️ ${success}/${files.length} file berhasil`;
    alert("⚠️ Ada file yang gagal upload");
  }
}

// PDF
let files=[]; 
pdfDrop.onclick=()=>pdfFiles.click();
pdfFiles.onchange=e=>{files=Array.from(e.target.files);renderFiles();};

function renderFiles(){
  fileList.innerHTML="";
  files.forEach((f,i)=>{
    fileList.innerHTML+=`
    <div class="file-item">
      <div class="file-top">${f.name}<span class="remove" onclick="removeFile(${i})">✖</span></div>
      <div class="progress"><div class="bar" id="bar${i}"></div></div>
    </div>`;
  });
}

function removeFile(i){files.splice(i,1);renderFiles();}

// UPLOAD PDF
async function uploadSingle(file,i,token){

  const bar = document.getElementById("bar"+i);

  const base64 = await toBase64(file);

  bar.style.width = "30%";

  const path = `files/${tahun.value}/${bulan.value}/${file.name}`;
  const url = `https://api.github.com/repos/valios-idn/slip-gaji/contents/${path}`;

  bar.style.width = "60%";

  const res = await fetch(url,{
    method:"PUT",
    headers:{
      Authorization:`Bearer ${token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"upload slip",
      content:base64
    })
  });

  if(!res.ok) throw new Error();

  bar.style.width = "100%";
}

// BASE64
function toBase64(file){
  return new Promise(r=>{
    const fr=new FileReader();
    fr.onload=()=>r(fr.result.split(',')[1]);
    fr.readAsDataURL(file);
  });
}
</script>

</body>
</html>
