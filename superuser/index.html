<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Slip Gaji (GitHub Integrated)</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="sidebar">
  <h2>Admin Panel</h2>
  <ul>
    <li class="active" data-menu="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
    <li data-menu="generate-json"><i class="fas fa-file-code"></i> Generate JSON</li>
    <li data-menu="upload-pdf"><i class="fas fa-file-upload"></i> Upload Slip Gaji</li>
  </ul>
</div>

<div class="main-content">
  
  <!-- Dashboard -->
  <div class="menu-content active" id="dashboard">
    <h2>Dashboard</h2>
    <div class="dashboard-controls">
      <label>Tahun:
        <select id="tahun-dashboard"></select>
      </label>
      <label>Bulan:
        <select id="bulan-dashboard">
          <option value="01">Januari</option>
          <option value="02">Februari</option>
          <option value="03">Maret</option>
          <option value="04">April</option>
          <option value="05">Mei</option>
          <option value="06">Juni</option>
          <option value="07">Juli</option>
          <option value="08">Agustus</option>
          <option value="09">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">Desember</option>
        </select>
      </label>
      <label>Token GitHub:
        <input type="text" id="github-token" placeholder="Masukkan GitHub Token">
      </label>
      <label>Repo (user/repo):
        <input type="text" id="github-repo" placeholder="contoh: user/repo-gaji">
      </label>
      <button id="load-files">Tampilkan File</button>
    </div>
    <div id="file-list"></div>
  </div>

  <!-- Generate JSON -->
  <div class="menu-content" id="generate-json">
    <h2>Generate JSON</h2>
    <div class="generate-controls">
      <input type="file" id="excel-file" accept=".xlsx, .xls" multiple>
      <div id="excel-list"></div>
      <button id="generate-json-btn">Generate JSON</button>
      <button id="upload-json-btn">Upload ke GitHub</button>
      <h3>Preview JSON:</h3>
      <pre id="json-preview"></pre>
    </div>
  </div>

  <!-- Upload PDF -->
  <div class="menu-content" id="upload-pdf">
    <h2>Upload Slip Gaji (PDF)</h2>
    <div class="upload-controls">
      <label>Tahun:
        <select id="tahun-upload"></select>
      </label>
      <label>Bulan:
        <select id="bulan-upload">
          <option value="01">Januari</option>
          <option value="02">Februari</option>
          <option value="03">Maret</option>
          <option value="04">April</option>
          <option value="05">Mei</option>
          <option value="06">Juni</option>
          <option value="07">Juli</option>
          <option value="08">Agustus</option>
          <option value="09">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">Desember</option>
        </select>
      </label>
      <input type="file" id="pdf-files" accept=".pdf" multiple>
      <button id="upload-pdf-btn">Upload PDF</button>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="pdf-progress"></div>
    </div>
    <div id="upload-status"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>

</body>
</html>
