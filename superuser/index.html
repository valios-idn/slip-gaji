<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin-style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h2>🔐 Login Admin</h2>
  <input type="password" id="adminPass" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- APP -->
<div class="wrapper hidden" id="app">

  <div class="sidebar">
      <img src="https://github.com/valios-idn/slip-gaji/blob/main/images/logo.png" alt="Logo" class="logo"
        onerror="this.src='https://via.placeholder.com/110'">
    
    <h3>ADMIN</h3>
    <div class="menu" id="menuDashboard">Dashboard</div>
    <div class="menu" id="menuJSON">JSON Generator</div>
    <div class="menu" id="menuUpload">Upload Slip</div>
    <div class="menu" id="menuLogout">Logout</div>
  </div>

  <div class="content">

    <div id="dashboardPage" class="card">
      <h2>Selamat Datang</h2>
    </div>

    <div id="jsonPage" class="card hidden">
    <h2>JSON Generator</h2>

<div id="excelDrop" class="drop-area">
  📊 Klik / Drop Excel
  <input type="file" id="excelFile" hidden>
</div>

<div id="jsonFileList"></div>

<button id="generateJSONBtn">Generate JSON</button>

<input type="text" id="tokenJson" placeholder="GitHub Token">

<button id="uploadJSONBtn">Upload JSON</button>

<!-- ✅ STATUS UPLOAD -->
<div id="uploadStatus" class="upload-status">
  <div id="spinner" class="spinner"></div>
  <span id="statusText">Uploading...</span>
</div>

<textarea id="jsonOutput"></textarea>
</div>      

    <div id="uploadPage" class="card hidden">
      <h2>Upload PDF</h2>
      <select id="tahun">
  <option value="2026">2026</option>
  <option value="2027">2027</option>
  <option value="2028">2028</option>
  <option value="2029">2029</option>
  <option value="2030">2030</option>
</select>

<select id="bulan">
  <option value="01">Januari</option>
  <option value="02">Februari</option>
  <option value="03">Maret</option>
  <option value="04">April</option>
  <option value="05">Mei</option>
  <option value="06">Juni</option>
  <option value="07">Juli</option>
  <option value="08">Agustus</option>
  <option value="09">September</option>
  <option value="10">Oktober</option>
  <option value="11">November</option>
  <option value="12">Desember</option>
</select>

      <div id="pdfDrop" class="drop-area">
        📂 Klik / Drop PDF
        <input type="file" id="pdfFiles" multiple hidden>
      </div>

      <div id="fileList"></div>

      <input type="text" id="tokenUpload" placeholder="GitHub Token">
      <button id="uploadPDFBtn">Upload</button>

    </div>

  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
