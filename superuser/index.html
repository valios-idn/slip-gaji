<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin-style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h2>🔐 Login Admin</h2>
  <input type="password" id="adminPass" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- APP -->
<div class="wrapper hidden" id="app">

  <div class="sidebar">
    <h3>⚡ ADMIN</h3>
    <div class="menu" id="menuDashboard">Dashboard</div>
    <div class="menu" id="menuJSON">JSON Generator</div>
    <div class="menu" id="menuUpload">Upload Slip</div>
    <div class="menu" id="menuLogout">Logout</div>
  </div>

  <div class="content">

    <div id="dashboardPage" class="card">
      <h2>👋 Selamat Datang</h2>
    </div>

    <div id="jsonPage" class="card hidden">
      <h2>JSON Generator</h2>
      <div id="excelDrop" class="drop-area">
        📊 Klik / Drop Excel
        <input type="file" id="excelFile" hidden>
      </div>
      <div id="jsonFileList"></div>
      <button id="generateJSONBtn">Generate JSON</button>
      <input type="text" id="tokenJson" placeholder="GitHub Token">
      <button id="uploadJSONBtn">Upload JSON</button>
      <textarea id="jsonOutput"></textarea>
    </div>

    <div id="uploadPage" class="card hidden">
      <h2>Upload PDF</h2>
      <select id="tahun"><option>2026</option></select>
      <select id="bulan"><option value="01">Januari</option></select>

      <div id="pdfDrop" class="drop-area">
        📂 Klik / Drop PDF
        <input type="file" id="pdfFiles" multiple hidden>
      </div>

      <div id="fileList"></div>

      <input type="text" id="tokenUpload" placeholder="GitHub Token">
      <button id="uploadPDFBtn">Upload</button>

    </div>

  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
